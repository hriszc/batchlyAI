name = "batchlyai"
compatibility_date = "2026-05-04"
compatibility_flags = ["nodejs_compat"]
main = ".output/server/index.mjs"

[assets]
binding = "ASSETS"
directory = ".output/public"

[[d1_databases]]
binding = "batchlyai_db"
database_name = "batchlyai-db"
database_id = "0f1f63d2-eea4-4801-ae73-c56560096a21"

[[kv_namespaces]]
binding = "batchlyai_kv"
id = "bfcff2adc31c4f4292f758c72ca9386b"

[[r2_buckets]]
binding = "batchlyai_r2"
bucket_name = "batchlyai-uploads"

# Secrets: use `wrangler secret put <KEY>` to set each
#   GRSAI_API_KEY
#   REPLICATE_API_KEY
#   DEEPSEEK_API_KEY
#   GRS_WEBHOOK_SECRET
#   FILE_URL_SIGNING_SECRET
#   STRIPE_SECRET_KEY
#   STRIPE_WEBHOOK_SECRET
#   GA4_API_SECRET
#   R2_ENDPOINT
#   R2_BUCKET

# Migration: run `npx wrangler d1 migrations apply batchlyai-db` after schema changes
[[d1_databases.migrations]]
database_name = "batchlyai-db"
migrations_dir = "./drizzle"

[observability]
enabled = true
head_sampling_rate = 0.1

[ai]
binding = "AI"

[[send_email]]
name = "EMAIL"

# Canary deployment: new versions start at 0% traffic.
# Test via: https://batchlyai.com/?cwv_debug=2
# Promote:  npx wrangler versions promote
[deployment]
strategy = "canary"

[vars]
VITE_BASE_URL = "https://batchlyai.com"
VITE_GA4_MEASUREMENT_ID = "G-NXC67QZF3N"
GA4_MEASUREMENT_ID = "G-NXC67QZF3N"

